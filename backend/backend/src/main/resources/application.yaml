spring:
  application:
    name: backend
  profiles:
    active: local
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: ecommerce_db_inventory

server:
  port: 8080
  servlet:
    context-path: /api