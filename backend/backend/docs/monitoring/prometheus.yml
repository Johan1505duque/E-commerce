global:
  scrape_interval: 15s # Por defecto, recolecta métricas cada 15 segundos.

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/api/actuator/prometheus' # Ruta donde Spring Boot expone las métricas
    static_configs:
      - targets: ['localhost:8080'] # La dirección de tu aplicación Spring Boot
